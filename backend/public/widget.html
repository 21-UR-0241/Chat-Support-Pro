    #file-preview .preview-image { width:60px; height:60px; border-radius:8px; object-fit:cover; }
    #file-preview .preview-file-icon { width:60px; height:60px; background:var(--primary-color); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:24px; color:white; }
    #file-preview .preview-info { flex:1; min-width:0; }
    #file-preview .preview-name { font-size:14px; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    #file-preview .preview-size { font-size:12px; color:var(--text-secondary); margin-top:2px; }
    #file-preview .preview-progress { font-size:12px; color:var(--success-color); margin-top:2px; font-weight:600; }
    #file-preview .remove-file-btn { background:none; border:none; font-size:20px; cursor:pointer; color:var(--text-secondary); padding:4px 8px; }
    #file-preview .remove-file-btn:hover{color:#dc2626}
    #file-preview .remove-file-btn:disabled{opacity:0.5;cursor:not-allowed}
    #chat-input-container { padding:16px 20px; background:white; border-top:1px solid var(--border-color); display:none; gap:10px; flex-shrink:0; }
    #chat-input-container.visible { display:flex; }
    #attach-button { width:44px; height:44px; border-radius:var(--bubble-radius); background:transparent; border:1px solid var(--border-color); color:var(--text-color); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:20px; transition:background 0.2s; }
    #attach-button:hover{background:var(--bg-color)}
    #attach-button:disabled{opacity:0.5;cursor:not-allowed}
    #chat-input { flex:1; padding:12px 16px; border:1px solid var(--border-color); border-radius:var(--bubble-radius); font-size:14px; outline:none; resize:none; max-height:120px; font-family:inherit; transition:border-color 0.2s; }
    #chat-input:focus{border-color:var(--primary-color)}
    #send-button { width:44px; height:44px; border-radius:var(--bubble-radius); background:var(--header-bg); border:none; color:white; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:opacity 0.2s; }
    #send-button:hover:not(:disabled){opacity:0.85}
    #send-button:disabled{background:#cbd5e0;cursor:not-allowed}
    #image-lightbox { display:none; position:fixed; top:0;left:0;right:0;bottom:0; background:rgba(0,0,0,0.9); z-index:10000; align-items:center; justify-content:center; padding:20px; }
    #image-lightbox.visible{display:flex}
    #image-lightbox img{max-width:100%;max-height:100%;object-fit:contain}
    #image-lightbox .close-lightbox { position:absolute; top:20px;right:20px; background:rgba(255,255,255,0.2); border:none; color:white; font-size:30px; cursor:pointer; width:50px;height:50px; border-radius:50%; display:flex; align-items:center; justify-content:center; transition:background 0.2s; }
    #image-lightbox .close-lightbox:hover{background:rgba(255,255,255,0.3)}
  </style>
</head>
<body>
  <div id="chat-header">
    <div class="avatar" id="header-avatar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
      </svg>
    </div>
    <div class="info">
      <h3 id="brand-name">Chat Support</h3>
      <p id="status">
        <span class="status-indicator" id="status-indicator"></span>
        <span id="status-text">Loading...</span>
      </p>
    </div>
  </div>
  <div id="chat-messages">
    <div id="email-collection">
      <div class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
          <polyline points="22,6 12,13 2,6"></polyline>
        </svg>
      </div>
      <h2>We will be glad to help you!</h2>
      <p>Please enter your email address to continue.</p>
      <form class="email-form" id="email-form">
        <div class="form-group">
          <label for="customer-email">Email Address *</label>
          <input type="email" id="customer-email" placeholder="your@email.com" required>
          <div class="error-text" id="email-error">Please enter a valid email</div>
        </div>
        <div class="form-group">
          <label for="customer-name">Name (Optional)</label>
          <input type="text" id="customer-name" placeholder="Your name">
        </div>
        <button type="submit" class="submit-button">Start Chat</button>
        <p class="privacy-note">Your information is secure.</p>
      </form>
    </div>
    <div id="welcome-message">
      <div class="welcome-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
      </div>
      <h2>Welcome!</h2>
      <p>How can we help you today?</p>
    </div>
  </div>
  <div id="file-preview">
    <div id="preview-content"></div>
    <div class="preview-info">
      <div class="preview-name" id="preview-name"></div>
      <div class="preview-size" id="preview-size"></div>
      <div class="preview-progress" id="preview-progress"></div>
    </div>
    <button id="remove-file-btn" class="remove-file-btn" type="button">✕</button>
  </div>
  <div id="chat-input-container">
    <button id="attach-button" title="Attach file" type="button">📎</button>
    <input type="file" id="file-input" accept="image/*,video/*,.pdf,.doc,.docx,.xls,.xlsx,.heic,.heif" style="display:none;">
    <textarea id="chat-input" placeholder="Type your message..." rows="1"></textarea>
    <button id="send-button" disabled type="button">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
  <div id="image-lightbox">
    <button class="close-lightbox" type="button">✕</button>
    <img id="lightbox-image" src="" alt="Full size image">
  </div>

  <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
  <script>
    console.log('[Widget] Starting...');
    const urlParams = new URLSearchParams(window.location.search);
    const STORE_ID = urlParams.get('store');
    const API_URL = window.location.origin;
    const WS_URL = window.location.origin.replace(/^http/,'ws') + '/ws';
    const HEIC_PATH_RE = /file:\/\/[^\s]*\.hei[cf]/i;

    function applyTheme(t){
      var r=document.documentElement;
      r.style.setProperty('--primary-color',t.primary);
      r.style.setProperty('--primary-dark',t.dark);
      r.style.setProperty('--primary-light',t.light);
      r.style.setProperty('--success-color',t.primary);
      r.style.setProperty('--header-bg',t.headerBg);
      r.style.setProperty('--header-shadow',t.headerShadow);
      r.style.setProperty('--bubble-radius',t.bubbleRadius);
      r.style.setProperty('--avatar-radius',t.avatarRadius);
      var hdr=document.getElementById('chat-header');
      if(hdr){hdr.style.background=t.headerBg;hdr.style.boxShadow=t.headerShadow;}
      console.log('[Widget] Theme:',t.name,'| Store:',STORE_ID);
    }
   var ACTIVE_THEME={name:'Emerald',primary:'#3bbe28',dark:'#2fa01e',light:'#4cd938',headerBg:'linear-gradient(135deg,#3bbe28,#2fa01e)',headerShadow:'0 2px 10px rgba(59,190,40,0.35)',bubbleRadius:'12px',avatarRadius:'6px'};

    // ── Shopify theme color override ──────────────────────────
    // If widget-init.js passed ?primary=&dark=&light= in the URL
    // (sourced from Shopify theme Liquid settings), use those
    // colors instead of the rotating store-index theme.
    // The bubbleRadius/avatarRadius from the store-index theme
    // are kept so each store still has a distinct shape identity.
    function hexToRgba(hex,alpha){
      hex=hex.replace('#','');
      if(hex.length===3)hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
      var r=parseInt(hex.slice(0,2),16),g=parseInt(hex.slice(2,4),16),b=parseInt(hex.slice(4,6),16);
      return'rgba('+r+','+g+','+b+','+alpha+')';
    }
    (function(){
      var cp=urlParams.get('primary');
      var cd=urlParams.get('dark');
      var cl=urlParams.get('light');
      if(cp){
        var p=decodeURIComponent(cp);
        var d=cd?decodeURIComponent(cd):p;
        var l=cl?decodeURIComponent(cl):p;
        ACTIVE_THEME={
          name:         'ShopifyTheme',
          primary:      p,
          dark:         d,
          light:        l,
          headerBg:     'linear-gradient(135deg,'+d+','+p+')',
          headerShadow: '0 2px 10px '+hexToRgba(p,0.35),
          bubbleRadius: ACTIVE_THEME.bubbleRadius,  // keep shape
          avatarRadius: ACTIVE_THEME.avatarRadius   // keep shape
        };
        console.log('[Widget] Theme: Shopify ('+p+') | Store:',STORE_ID);
      }
    })();
    // ─────────────────────────────────────────────────────────

    applyTheme(ACTIVE_THEME);

    // State
    let conversationId=null,ws=null,wsToken=null,tokenLastRefreshed=null;
    const TOKEN_REFRESH_INTERVAL=5*60*1000;
    let customerEmail=null,customerName=null,customerData=null,customerOrders=[],customerCart=null,storeSettings=null;
    let reconnectAttempts=0,maxReconnectAttempts=5,reconnectDelay=2000;
    let displayedMessageIds=new Set(),typingTimeout=null,typingDebounceTimer=null,messageSource=null,historyLoaded=false;
    let selectedFile=null,uploading=false,uploadProgress=0;

    function parseMarkdown(text){
      if(!text||typeof text!=='string')return'';
      const esc=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      return esc
        .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
        .replace(/__(.+?)__/g,'<strong>$1</strong>')
        .replace(/\*(?!\*)(.+?)(?<!\*)\*/g,'<em>$1</em>')
        .replace(/_(?!_)(.+?)(?<!_)_/g,'<em>$1</em>')
        .replace(/~~(.+?)~~/g,'<s>$1</s>')
        .replace(/`([^`]+)`/g,'<code>$1</code>')
        .replace(/\n/g,'<br>');
    }

    const ACTIVITY_EVENTS=['mousemove','mousedown','keydown','touchstart','scroll','click'];
    const INACTIVE_THRESHOLD=2*60*1000,HEARTBEAT_INTERVAL=30*1000,PRESENCE_UPDATE_INTERVAL=60*1000;
    let lastActivityTime=Date.now(),isPageVisible=true,isCustomerActive=true;
    let heartbeatTimer=null,presenceApiTimer=null,activityThrottleTimer=null;

    function onUserActivity(){
      lastActivityTime=Date.now();
      if(!isCustomerActive){isCustomerActive=true;sendPresenceUpdate('online');}
    }
    function startActivityTracking(){
      ACTIVITY_EVENTS.forEach(function(evt){
        document.addEventListener(evt,function(){
          if(activityThrottleTimer)return;
          activityThrottleTimer=setTimeout(function(){activityThrottleTimer=null;},1000);
          onUserActivity();
        },{passive:true});
      });
      document.addEventListener('visibilitychange',function(){
        isPageVisible=!document.hidden;
        if(isPageVisible)onUserActivity();
        else{isCustomerActive=false;sendPresenceUpdate('away');}
      });
      window.addEventListener('focus',function(){isPageVisible=true;onUserActivity();});
      window.addEventListener('blur',function(){isPageVisible=false;isCustomerActive=false;sendPresenceUpdate('away');});
      heartbeatTimer=setInterval(function(){
        if(Date.now()-lastActivityTime>=INACTIVE_THRESHOLD&&isCustomerActive){isCustomerActive=false;sendPresenceUpdate('away');}
        sendPresenceHeartbeat();
      },HEARTBEAT_INTERVAL);
      presenceApiTimer=setInterval(function(){sendPresenceViaApi();},PRESENCE_UPDATE_INTERVAL);
    }
    function stopActivityTracking(){if(heartbeatTimer)clearInterval(heartbeatTimer);if(presenceApiTimer)clearInterval(presenceApiTimer);}
    function sendPresenceUpdate(status){
      if(!conversationId)return;
      if(ws&&ws.readyState===WebSocket.OPEN){
        ws.send(JSON.stringify({type:'presence',conversationId:parseInt(conversationId),status:status,customerEmail:customerEmail,lastActivityAt:new Date(lastActivityTime).toISOString()}));
      }else sendPresenceViaApi(status);
    }
    function sendPresenceHeartbeat(){
      if(ws&&ws.readyState===WebSocket.OPEN&&conversationId)
        ws.send(JSON.stringify({type:'heartbeat',conversationId:parseInt(conversationId),status:isCustomerActive?'online':'away',customerEmail:customerEmail,lastActivityAt:new Date(lastActivityTime).toISOString()}));
    }
    function sendPresenceViaApi(statusOverride){
      if(!conversationId||!customerEmail||!STORE_ID)return;
      var status=statusOverride||(isCustomerActive?'online':'away');
      fetch(API_URL+'/api/widget/presence',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({conversationId:parseInt(conversationId),customerEmail:customerEmail,storeIdentifier:STORE_ID,status:status,lastActivityAt:new Date(lastActivityTime).toISOString()})})
        .then(function(res){if(res.status===410){console.log('[Presence] Gone');stopActivityTracking();conversationId=null;localStorage.removeItem('chat_conv_'+STORE_ID);}})
        .catch(function(err){console.warn('[Presence API] Failed:',err.message);});
    }
    window.addEventListener('beforeunload',function(){
      if(conversationId&&customerEmail){
        var payload=JSON.stringify({conversationId:parseInt(conversationId),customerEmail:customerEmail,storeIdentifier:STORE_ID,status:'offline',lastActivityAt:new Date(lastActivityTime).toISOString()});
        if(navigator.sendBeacon)navigator.sendBeacon(API_URL+'/api/widget/presence',new Blob([payload],{type:'application/json'}));
        if(ws&&ws.readyState===WebSocket.OPEN){ws.send(JSON.stringify({type:'presence',conversationId:parseInt(conversationId),status:'offline',customerEmail:customerEmail}));ws.close();}
      }
    });

    const chatMessages=document.getElementById('chat-messages');
    const chatInput=document.getElementById('chat-input');
    const sendButton=document.getElementById('send-button');
    const emailCollection=document.getElementById('email-collection');
    const welcomeMessage=document.getElementById('welcome-message');
    const chatInputContainer=document.getElementById('chat-input-container');
    const emailForm=document.getElementById('email-form');
    const statusText=document.getElementById('status-text');
    const statusIndicator=document.getElementById('status-indicator');
    const brandName=document.getElementById('brand-name');
    const headerAvatar=document.getElementById('header-avatar');
    const attachButton=document.getElementById('attach-button');
    const fileInput=document.getElementById('file-input');
    const filePreview=document.getElementById('file-preview');
    const previewContent=document.getElementById('preview-content');
    const previewName=document.getElementById('preview-name');
    const previewSize=document.getElementById('preview-size');
    const previewProgress=document.getElementById('preview-progress');
    const removeFileBtn=document.getElementById('remove-file-btn');
    const imageLightbox=document.getElementById('image-lightbox');
    const lightboxImage=document.getElementById('lightbox-image');
    if(!STORE_ID)console.error('[Widget] No store ID');

    function formatMessageTime(ts){return new Date(ts).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});}
    function formatMessageDate(ts){
      const d=new Date(ts),t=new Date(),y=new Date(t);y.setDate(y.getDate()-1);
      if(d.toDateString()===t.toDateString())return'Today';
      if(d.toDateString()===y.toDateString())return'Yesterday';
      return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:d.getFullYear()!==t.getFullYear()?'numeric':undefined});
    }
    function shouldShowDate(c,n){if(!n)return true;try{return new Date(c).toDateString()!==new Date(n).toDateString();}catch(e){return false;}}
    function updateMessageDateDisplay(){
      const msgs=Array.from(chatMessages.querySelectorAll('.message:not(.system):not(#typing-indicator)'));
      msgs.forEach((msg,i)=>{
        const ds=msg.querySelector('.message-date');if(!ds||!msg.dataset.timestamp)return;
        const nts=msgs[i+1]?msgs[i+1].dataset.timestamp:null;
        if(shouldShowDate(msg.dataset.timestamp,nts)){ds.textContent='• '+formatMessageDate(msg.dataset.timestamp);ds.style.display='inline';}
        else ds.style.display='none';
      });
    }

    function formatFileSize(b){if(b===0)return'0 Bytes';const k=1024,s=['Bytes','KB','MB','GB'],i=Math.floor(Math.log(b)/Math.log(k));return Math.round(b/Math.pow(k,i)*100)/100+' '+s[i];}
    attachButton.addEventListener('click',()=>fileInput.click());
    fileInput.addEventListener('change',async(e)=>{
      let file=e.target.files[0];if(!file)return;
      const maxSize=10*1024*1024;
      const isHeic=file.type==='image/heic'||file.type==='image/heif'||/\.hei[cf]$/i.test(file.name);
      if(isHeic){
        try{
          previewProgress.textContent='Converting…';filePreview.classList.add('visible');previewName.textContent=file.name;previewContent.innerHTML='<div class="preview-file-icon">⏳</div>';
          const blob=await heic2any({blob:file,toType:'image/jpeg',quality:0.85});
          file=new File([blob],file.name.replace(/\.hei[cf]$/i,'.jpg'),{type:'image/jpeg'});
          previewProgress.textContent='';
        }catch(err){console.error('HEIC conversion failed:',err);filePreview.classList.remove('visible');fileInput.value='';showHeicInstructions();return;}
      }
      if(file.size>maxSize){alert('File size must be less than 10MB');fileInput.value='';return;}
      selectedFile=file;showFilePreview(file);
    });
    function showFilePreview(file){
      filePreview.classList.add('visible');previewName.textContent=file.name;previewSize.textContent=formatFileSize(file.size);previewProgress.textContent='';
      if(file.type.startsWith('image/')){const r=new FileReader();r.onload=(e)=>{previewContent.innerHTML='<img src="'+e.target.result+'" class="preview-image" alt="Preview">';};r.readAsDataURL(file);}
      else previewContent.innerHTML='<div class="preview-file-icon">📎</div>';
      updateSendButton();
    }
    removeFileBtn.addEventListener('click',()=>removeFile());
    function removeFile(){selectedFile=null;filePreview.classList.remove('visible');fileInput.value='';previewContent.innerHTML='';previewName.textContent='';previewSize.textContent='';previewProgress.textContent='';updateSendButton();}
    function updateSendButton(){sendButton.disabled=!chatInput.value.trim()&&!selectedFile;}
    async function uploadFileToBunny(file){
      try{uploading=true;uploadProgress=0;const fd=new FormData();fd.append('file',file);
        const xhr=new XMLHttpRequest();
        xhr.upload.addEventListener('progress',(e)=>{if(e.lengthComputable){uploadProgress=Math.round(e.loaded*100/e.total);previewProgress.textContent=uploadProgress+'%';}});
        const p=new Promise((res,rej)=>{
          xhr.addEventListener('load',()=>{if(xhr.status>=200&&xhr.status<300)res(JSON.parse(xhr.responseText));else rej(new Error('Upload failed: '+xhr.status));});
          xhr.addEventListener('error',()=>rej(new Error('Upload failed')));
          xhr.open('POST',API_URL+'/api/files/upload');xhr.send(fd);
        });return await p;
      }catch(e){console.error('File upload failed:',e);throw e;}
      finally{uploading=false;uploadProgress=0;previewProgress.textContent='';}
    }
    function openImageLightbox(url){lightboxImage.src=url;imageLightbox.classList.add('visible');}
    imageLightbox.addEventListener('click',(e)=>{if(e.target===imageLightbox||e.target.classList.contains('close-lightbox'))imageLightbox.classList.remove('visible');});
    function createFileAttachmentHtml(fd){
      if(!fd||!fd.url)return'';
      if(fd.type&&fd.type.startsWith('image/'))return'<div class="file-attachment"><img src="'+escapeHtml(fd.url)+'" alt="'+escapeHtml(fd.name||'Image')+'"></div>';
      return'<div class="file-attachment file-doc"><div class="file-icon">📎</div><div class="file-info"><div class="file-name">'+escapeHtml(fd.name||'File')+'</div>'+(fd.size?'<div class="file-size">'+formatFileSize(fd.size)+'</div>':'')+'</div></div>';
    }
    function showHeicInstructions(){addMessage('system','📱 To send this photo:\n1. Open it in the Photos app\n2. Tap Share → Copy Photo\n3. Paste here again','System');}
    function escapeHtml(text){const d=document.createElement('div');d.textContent=text;return d.innerHTML;}
    function detectMessageSource(){
      const s=urlParams.get('source')||urlParams.get('channel');if(s){messageSource=s;return;}
      const ref=document.referrer;if(ref){try{messageSource=new URL(ref).hostname;}catch(e){messageSource='Website';}}else messageSource='Direct';
    }
    function getInitials(name){if(!name)return'CS';const p=name.trim().split(' ');if(p.length===1)return p[0].substring(0,2).toUpperCase();return(p[0][0]+p[p.length-1][0]).toUpperCase();}
    function isValidEmail(e){return/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);}
    function autoDetectCustomer(){
      try{if(window.parent&&window.parent.chatCustomerData){const d=window.parent.chatCustomerData;return{email:d.email,name:d.name||d.firstName,autoDetected:true};}}catch(e){}
      const ue=urlParams.get('email');if(ue&&isValidEmail(ue))return{email:ue,name:urlParams.get('name')||null,autoDetected:true};
      try{const se=localStorage.getItem('chat_email_'+STORE_ID),sn=localStorage.getItem('chat_name_'+STORE_ID);if(se&&isValidEmail(se))return{email:se,name:sn||null,autoDetected:true};}catch(e){}
      return null;
    }

    async function loadConversationHistory(){
      if(!conversationId||historyLoaded||!STORE_ID){if(!conversationId||!STORE_ID)welcomeMessage.classList.add('visible');return;}
      try{
        showLoadingHistory();
        const url=API_URL+'/api/widget/conversations/'+conversationId+'/messages?store='+STORE_ID;
        let response;
        try{response=await fetchWithRetry(url,{headers:{'Content-Type':'application/json'}},20000,2);}
        catch(fe){hideLoadingHistory();welcomeMessage.classList.add('visible');return;}
        if(!response.ok){if(response.status===404){localStorage.removeItem('chat_conv_'+STORE_ID);conversationId=null;}hideLoadingHistory();welcomeMessage.classList.add('visible');return;}
        let data;try{data=JSON.parse(await response.text());}catch(e){hideLoadingHistory();welcomeMessage.classList.add('visible');return;}
        const messages=Array.isArray(data)?data:(data.messages||data.data||[]);
        hideLoadingHistory();
        if(messages.length>0){welcomeMessage.style.display='none';messages.forEach(displayHistoryMessage);setTimeout(updateMessageDateDisplay,100);historyLoaded=true;setTimeout(()=>{chatMessages.scrollTop=chatMessages.scrollHeight;},100);}
        else welcomeMessage.classList.add('visible');
      }catch(error){console.error('[History] Error:',error);hideLoadingHistory();welcomeMessage.classList.add('visible');}
    }
    function displayHistoryMessage(msg){
      const m={id:msg.id,senderType:msg.senderType||msg.sender_type||msg.type||'agent',senderName:msg.senderName||msg.sender_name||msg.sender||'Support',content:msg.content||msg.message||msg.text||'',timestamp:msg.createdAt||msg.created_at||msg.timestamp||new Date().toISOString(),fileData:msg.fileData||msg.file_data||null};
      if(displayedMessageIds.has(m.id))return;displayedMessageIds.add(m.id);
      const div=document.createElement('div');div.className='message '+m.senderType+' history';div.dataset.messageId=m.id;div.dataset.timestamp=m.timestamp;
      const time=formatMessageTime(m.timestamp);
      const at=m.senderType==='customer'?getInitials(customerName||m.senderName):getInitials(m.senderName);
      const sn=m.senderType!=='system'?'<div class="sender-name">'+escapeHtml(m.senderName)+'</div>':'';
      let fa='';if(m.fileData){const fd=typeof m.fileData==='string'?JSON.parse(m.fileData):m.fileData;fa=createFileAttachmentHtml(fd);}
      const ch=m.content?'<div class="text">'+parseMarkdown(m.content)+'</div>':'';
      div.innerHTML='<div class="avatar">'+at+'</div><div class="message-content"><div class="bubble">'+sn+ch+fa+'</div><div class="message-datetime"><span class="message-time">'+time+'</span><span class="message-date" style="display:none;"></span></div></div>';
      chatMessages.appendChild(div);
      const img=div.querySelector('.file-attachment img');if(img)img.addEventListener('click',()=>openImageLightbox(img.src));
    }
    function showLoadingHistory(){hideLoadingHistory();const d=document.createElement('div');d.className='loading-history';d.id='loading-history-indicator';d.innerHTML='<div class="spinner"></div><span>Loading conversation...</span>';chatMessages.appendChild(d);}
    function hideLoadingHistory(){const el=document.getElementById('loading-history-indicator');if(el)el.remove();}
    function addMessage(type,text,sender,messageId,pending,fileData){
      const div=document.createElement('div');div.className='message '+type;
      if(pending)div.classList.add('pending');div.dataset.messageId=messageId||('local-'+Date.now());
      const ts=new Date().toISOString();div.dataset.timestamp=ts;const time=formatMessageTime(ts);
      const at=type==='customer'?getInitials(customerName||sender):type==='agent'?getInitials(sender||'Support'):'!';
      const sn=type!=='system'&&sender?'<div class="sender-name">'+escapeHtml(sender)+'</div>':'';
      let fa='';if(fileData)fa=createFileAttachmentHtml(fileData);
      const ch=text?'<div class="text">'+(type==='system'?escapeHtml(text):parseMarkdown(text))+'</div>':'';
      div.innerHTML='<div class="avatar">'+at+'</div><div class="message-content"><div class="bubble">'+sn+ch+fa+'</div><div class="message-datetime"><span class="message-time">'+time+'</span><span class="message-date" style="display:none;"></span></div></div>';
      chatMessages.appendChild(div);updateMessageDateDisplay();chatMessages.scrollTop=chatMessages.scrollHeight;
      const img=div.querySelector('.file-attachment img');if(img)img.addEventListener('click',()=>openImageLightbox(img.src));
      return div;
    }

    emailForm.addEventListener('submit',async(e)=>{
      e.preventDefault();const email=document.getElementById('customer-email').value.trim();const name=document.getElementById('customer-name').value.trim();
      if(!isValidEmail(email))return;customerEmail=email;customerName=name||'Guest';
      localStorage.setItem('chat_email_'+STORE_ID,customerEmail);localStorage.setItem('chat_name_'+STORE_ID,customerName);
      const sb=emailForm.querySelector('.submit-button');sb.disabled=true;sb.innerHTML='<span class="btn-spinner"></span> Connecting...';
      const lu=await lookupConversation(customerEmail);if(lu){conversationId=String(lu);localStorage.setItem('chat_conv_'+STORE_ID,conversationId);}
      showChatInterface();loadCustomerData();
    });
    async function loadCustomerData(){if(!customerEmail)return;try{await Promise.all([fetchCustomerData(customerEmail),fetchCustomerOrders(customerEmail),fetchCustomerCart(customerEmail)]);}catch(e){console.error('Failed to load customer data:',e);}}
    async function showChatInterface(){
      emailCollection.classList.remove('visible');chatInputContainer.classList.add('visible');
      if(conversationId&&!historyLoaded){await loadConversationHistory();await ensureFreshToken(true);}else welcomeMessage.classList.add('visible');
      chatInput.focus();startActivityTracking();sendPresenceUpdate('online');
      const MSG='We usually get back to you within 1 to 6 hours <strong>(Please note it can be the next day as well in some cases)</strong>';
      if(conversationId&&wsToken){setTimeout(()=>connectWebSocket(),500);}
      else if(conversationId){updateStatus('connecting','Connecting...');try{await ensureFreshToken(true);if(wsToken)connectWebSocket();else updateStatus('online',MSG);}catch(e){updateStatus('online',MSG);}}
      else updateStatus('online',MSG);
    }

    async function fetchWithTimeout(url,options,timeout){
      if(timeout===undefined)timeout=15000;const c=new AbortController();const id=setTimeout(()=>c.abort(),timeout);
      try{const r=await fetch(url,Object.assign({},options,{signal:c.signal}));clearTimeout(id);return r;}
      catch(e){clearTimeout(id);if(e.name==='AbortError')throw new Error('Request timeout');throw e;}
    }
    async function fetchWithRetry(url,options,timeout,retries){
      if(timeout===undefined)timeout=15000;if(retries===undefined)retries=2;
      for(let a=0;a<=retries;a++){try{return await fetchWithTimeout(url,options,a===0?timeout+15000:timeout);}catch(e){if(a===retries)throw e;await new Promise(r=>setTimeout(r,1000*(a+1)));}}
    }
    async function ensureFreshToken(force){
      const now=Date.now();if(!force&&wsToken&&tokenLastRefreshed&&(now-tokenLastRefreshed)<TOKEN_REFRESH_INTERVAL)return wsToken;
      try{const r=await fetchWithRetry(API_URL+'/api/widget/session?store='+STORE_ID+(conversationId?'&conversationId='+conversationId:''),{},10000,1);if(r.ok){const d=await r.json();wsToken=d.token;tokenLastRefreshed=now;return wsToken;}}
      catch(e){console.error('[Token] Error:',e);}return wsToken;
    }
    async function fetchCustomerData(email){if(!email)return null;try{const r=await fetchWithTimeout(API_URL+'/api/customers/lookup?store='+STORE_ID+'&email='+encodeURIComponent(email),{},12000);if(r.ok){customerData=await r.json();return customerData;}}catch(e){console.error('Failed to fetch customer:',e);}return null;}
    async function fetchCustomerOrders(email){if(!email)return[];try{const r=await fetchWithTimeout(API_URL+'/api/customers/orders?store='+STORE_ID+'&email='+encodeURIComponent(email),{},12000);if(r.ok){customerOrders=await r.json();return customerOrders;}}catch(e){console.error('Failed to fetch orders:',e);}return[];}
    async function lookupConversation(email){if(!email||!STORE_ID)return null;try{const r=await fetchWithTimeout(API_URL+'/api/widget/conversation/lookup?store='+STORE_ID+'&email='+encodeURIComponent(email),{},10000);if(r.ok){const d=await r.json();if(d.conversationId)return d.conversationId;}}catch(e){console.error('[Lookup] Error:',e);}return null;}
    async function fetchCustomerCart(email){if(!email)return null;try{if(window.parent&&window.parent.chatCartData){customerCart=window.parent.chatCartData;return customerCart;}}catch(e){}try{const r=await fetchWithTimeout(API_URL+'/api/customers/cart?store='+STORE_ID+'&email='+encodeURIComponent(email),{},12000);if(r.ok){customerCart=await r.json();return customerCart;}}catch(e){console.error('Failed to fetch cart:',e);}return null;}

    async function init(){
      try{
        detectMessageSource();await loadSettings();setupEventListeners();
        const det=autoDetectCustomer();
        if(det){
          customerEmail=det.email;customerName=det.name||'Guest';
          localStorage.setItem('chat_email_'+STORE_ID,customerEmail);if(customerName)localStorage.setItem('chat_name_'+STORE_ID,customerName);
          conversationId=localStorage.getItem('chat_conv_'+STORE_ID);
          if(!conversationId&&customerEmail){const lu=await lookupConversation(customerEmail);if(lu){conversationId=String(lu);localStorage.setItem('chat_conv_'+STORE_ID,conversationId);}}
          await loadCustomerData();await showChatInterface();
        }else{emailCollection.classList.add('visible');updateStatus('online','We usually get back to you within 1 to 6 hours <strong>(Please note it can be the next day as well in some cases)</strong>');}
      }catch(e){console.error('[Init] Fatal:',e);updateStatus('offline','Offline');}
    }
    function updateStatus(status,text){
      statusText.innerHTML=text;statusIndicator.classList.remove('offline','connecting');
      if(status==='connecting')statusIndicator.classList.add('connecting');else if(status==='offline')statusIndicator.classList.add('offline');
    }
    async function loadSettings(){
      try{
        const r=await fetchWithRetry(API_URL+'/api/widget/settings?store='+STORE_ID,{},15000,2);
        if(r.ok){
          storeSettings=await r.json();brandName.textContent=storeSettings.brandName||'Chat Support';
          // Re-apply theme to prevent settings API from overriding our colors
          applyTheme(ACTIVE_THEME);
          if(storeSettings.widgetSettings?.greeting)welcomeMessage.querySelector('p').innerHTML=storeSettings.widgetSettings.greeting;
          if(storeSettings.widgetSettings?.placeholder)chatInput.placeholder=storeSettings.widgetSettings.placeholder;
        }
        await ensureFreshToken(true);
      }catch(e){console.error('[Settings] Error:',e);}
    }

    async function connectWebSocket(){
      if(ws&&(ws.readyState===WebSocket.CONNECTING||ws.readyState===WebSocket.OPEN))return;if(!conversationId)return;
      try{
        updateStatus('connecting','Connecting...');await ensureFreshToken(reconnectAttempts>0);if(!wsToken){updateStatus('offline','No token');return;}
        if(ws){ws.close();ws=null;}ws=new WebSocket(WS_URL);
        ws.onopen=()=>{reconnectAttempts=0;ws.send(JSON.stringify({type:'auth',token:wsToken,clientType:'customer'}));};
        ws.onmessage=(event)=>{try{handleWebSocketMessage(JSON.parse(event.data));}catch(e){console.error('[WebSocket] Parse error:',e);}};
        ws.onerror=()=>updateStatus('offline','Error');
        ws.onclose=(event)=>{
          updateStatus('offline','Disconnected');ws=null;
          if(reconnectAttempts<maxReconnectAttempts&&conversationId){reconnectAttempts++;updateStatus('connecting','Reconnecting...');setTimeout(()=>connectWebSocket(),reconnectDelay*reconnectAttempts);}
          else if(reconnectAttempts>=maxReconnectAttempts)updateStatus('offline','Offline');
        };
      }catch(e){console.error('[WebSocket] Failed:',e);updateStatus('offline','Failed');}
    }
    function handleWebSocketMessage(data){
      const MSG='We usually get back to you within 1 to 6 hours <strong>(Please note it can be the next day as well in some cases)</strong>';
      switch(data.type){
        case'connected':break;
        case'auth_ok':updateStatus('online',MSG);ws.send(JSON.stringify({type:'join_conversation',conversationId:parseInt(conversationId),role:'customer',token:wsToken,customerEmail:customerEmail,customerName:customerName,storeId:storeSettings?storeSettings.storeId:undefined}));sendPresenceUpdate('online');break;
        case'joined':updateStatus('online',MSG);break;
        case'new_message':if(data.message){onUserActivity();displayMessageFromWebSocket(data.message);}break;
        case'message_confirmed':updateMessageStatus(data.tempId,'confirmed',data.message);break;
        case'message_failed':updateMessageStatus(data.tempId,'failed');break;
        case'typing':if(data.isTyping&&data.senderType==='agent')showTypingIndicator();else if(!data.isTyping)hideTypingIndicator();break;
        case'message_deleted':if(data.messageId){const el=document.querySelector('[data-message-id="'+data.messageId+'"]');if(el)el.remove();displayedMessageIds.delete(data.messageId);updateMessageDateDisplay();}break;
        case'error':console.error('[WebSocket] Error:',data.message);if(data.message&&(data.message.includes('token')||data.message.includes('auth'))){wsToken=null;tokenLastRefreshed=null;}break;
      }
    }
    function displayMessageFromWebSocket(message){
      const msg={id:message.id,senderType:message.senderType||message.sender_type,senderName:message.senderName||message.sender_name,content:message.content,conversationId:message.conversationId||message.conversation_id,pending:message.pending,fileData:message.fileData||message.file_data||null,timestamp:message.createdAt||message.created_at||new Date().toISOString()};
      if(msg.conversationId&&msg.conversationId!==parseInt(conversationId))return;if(displayedMessageIds.has(msg.id))return;
      if(msg.senderType==='customer'){displayedMessageIds.add(msg.id);return;}
      hideTypingIndicator();displayedMessageIds.add(msg.id);addMessage(msg.senderType,msg.content,msg.senderName||'Support',msg.id,msg.pending,msg.fileData);
    }
    function updateMessageStatus(tempId,status,confirmedMessage){
      document.querySelectorAll('.message').forEach(el=>{
        if(el.dataset.messageId!==tempId)return;
        if(status==='confirmed'){el.dataset.messageId=(confirmedMessage&&confirmedMessage.id)||tempId;el.classList.remove('pending');}
        else if(status==='failed'){el.classList.remove('pending');el.classList.add('failed');}
      });
    }

    function setupEventListeners(){
      chatInput.addEventListener('input',()=>{
        updateSendButton();autoResizeTextarea();clearTimeout(typingDebounceTimer);
        typingDebounceTimer=setTimeout(()=>{
          if(ws&&ws.readyState===WebSocket.OPEN&&conversationId&&chatInput.value.trim()){
            ws.send(JSON.stringify({type:'typing',conversationId:parseInt(conversationId),isTyping:true,senderType:'customer',senderName:customerName||'Customer'}));
            clearTimeout(typingTimeout);typingTimeout=setTimeout(()=>{if(ws&&ws.readyState===WebSocket.OPEN&&conversationId)ws.send(JSON.stringify({type:'typing',conversationId:parseInt(conversationId),isTyping:false,senderType:'customer'}));},3000);
          }
        },300);
      });
      chatInput.addEventListener('keydown',(e)=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();if(chatInput.value.trim()||selectedFile)sendMessage();}});
      chatInput.addEventListener('paste',(e)=>{const p=e.clipboardData.getData('text/plain')||'';if(HEIC_PATH_RE.test(p.trim())){e.preventDefault();showHeicInstructions();}});
      sendButton.addEventListener('click',sendMessage);
    }
    function autoResizeTextarea(){chatInput.style.height='auto';chatInput.style.height=Math.min(chatInput.scrollHeight,120)+'px';}

    async function sendMessage(){
      const message=chatInput.value.trim();if(!message&&!selectedFile)return;if(uploading)return;
      if(message&&HEIC_PATH_RE.test(message)){chatInput.value='';autoResizeTextarea();updateSendButton();showHeicInstructions();chatInput.disabled=false;sendButton.disabled=false;return;}
      onUserActivity();clearTimeout(typingTimeout);clearTimeout(typingDebounceTimer);
      if(ws&&ws.readyState===WebSocket.OPEN&&conversationId)ws.send(JSON.stringify({type:'typing',conversationId:parseInt(conversationId),isTyping:false,senderType:'customer'}));
      chatInput.disabled=true;sendButton.disabled=true;attachButton.disabled=true;removeFileBtn.disabled=true;
      const tempId='temp-'+Date.now()+'-'+Math.random().toString(36).substr(2,9);
      let fileData=null;
      if(selectedFile){try{const ur=await uploadFileToBunny(selectedFile);fileData={url:ur.url,name:selectedFile.name,type:selectedFile.type,size:selectedFile.size};}
        catch(error){addMessage('system','Failed to upload file. Please try again.','System');chatInput.disabled=false;sendButton.disabled=false;attachButton.disabled=false;removeFileBtn.disabled=false;return;}}
      addMessage('customer',message,customerName||'You',tempId,true,fileData);
      chatInput.value='';chatInput.style.height='auto';removeFile();if(welcomeMessage.style.display!=='none')welcomeMessage.style.display='none';
      try{
        if(!conversationId){
          await ensureFreshToken(true);
          const response=await fetchWithRetry(API_URL+'/api/conversations',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({storeIdentifier:STORE_ID,customerEmail:customerEmail,customerName:customerName,initialMessage:message||(fileData?'📎 '+fileData.name:''),customerData:customerData,hasOrders:customerOrders.length>0,orderCount:customerOrders.length,cartSubtotal:customerCart?customerCart.subtotal||0:0,source:messageSource||'website',fileData:fileData})},15000,2);
          if(response.status===403){const fm=document.querySelector('[data-message-id="'+tempId+'"]');if(fm)fm.remove();addMessage('system','We are unable to process your request at this time.','System');chatInput.disabled=false;sendButton.disabled=false;attachButton.disabled=false;removeFileBtn.disabled=false;return;}
          if(!response.ok)throw new Error('Failed to create conversation');
          const conv=await response.json();conversationId=conv.id;localStorage.setItem('chat_conv_'+STORE_ID,conversationId);updateMessageStatus(tempId,'confirmed',{id:tempId});sendPresenceUpdate('online');if(wsToken&&!ws)connectWebSocket().catch(()=>{});
          let ar='Thanks for reaching out! An agent will be with you shortly.';if(customerData&&customerData.name)ar='Hi '+customerData.name+'! '+ar;if(customerOrders.length>0)ar+=' We can see you have '+customerOrders.length+' order'+(customerOrders.length!==1?'s':'')+' with us.';addMessage('agent',ar,'Support Team');
        }else{
          await ensureFreshToken(false);
          const response=await fetchWithRetry(API_URL+'/api/widget/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({conversationId:parseInt(conversationId),customerEmail:customerEmail,customerName:customerName,content:message||'',storeIdentifier:STORE_ID,tempId:tempId,customerData:customerData,hasOrders:customerOrders.length>0,cartSubtotal:customerCart?customerCart.subtotal||0:0,source:messageSource||'website',fileData:fileData})},15000,2);
          if(!response.ok){
            const ed=await response.json().catch(()=>({}));updateMessageStatus(tempId,'failed');
            if(response.status===403){const fm=document.querySelector('[data-message-id="'+tempId+'"]');if(fm)fm.remove();addMessage('system','We are unable to process your request at this time.','System');chatInput.disabled=false;sendButton.disabled=false;attachButton.disabled=false;removeFileBtn.disabled=false;return;}
            if(ed.error&&(ed.error.includes('conversation')||ed.error==='conversation_not_found'||ed.error.includes('token')||ed.error.includes('unauthorized'))){
              localStorage.removeItem('chat_conv_'+STORE_ID);conversationId=null;wsToken=null;tokenLastRefreshed=null;historyLoaded=false;if(ws&&ws.readyState===WebSocket.OPEN){ws.close();ws=null;}
              const fm=document.querySelector('[data-message-id="'+tempId+'"]');if(fm)fm.remove();addMessage('system','Session expired. Creating new conversation...','System');await new Promise(r=>setTimeout(r,800));
              const sm=chatMessages.lastElementChild;if(sm&&sm.classList.contains('system'))sm.remove();chatInput.value=message;chatInput.disabled=false;sendButton.disabled=false;attachButton.disabled=false;return sendMessage();
            }else throw new Error(ed.error||'Failed to send');
          }else{const sm=await response.json();updateMessageStatus(tempId,'confirmed',sm);if(sm.id)displayedMessageIds.add(sm.id);}
        }
        chatInput.disabled=false;sendButton.disabled=false;attachButton.disabled=false;removeFileBtn.disabled=false;chatInput.focus();
      }catch(error){
        console.error('Send failed:',error);if(error.message.includes('token')||error.message.includes('unauthorized')){wsToken=null;tokenLastRefreshed=null;}
        updateMessageStatus(tempId,'failed');addMessage('system',error.message==='Request timeout'?'Connection is slow. Please try sending again.':'Failed to send. Please try again.','System');
        chatInput.disabled=false;sendButton.disabled=false;attachButton.disabled=false;removeFileBtn.disabled=false;chatInput.focus();
      }
    }

    function showTypingIndicator(){hideTypingIndicator();const i=document.createElement('div');i.className='message agent';i.id='typing-indicator';i.innerHTML='<div class="avatar">SA</div><div class="typing-indicator"><div class="dots"><span></span><span></span><span></span></div></div>';chatMessages.appendChild(i);chatMessages.scrollTop=chatMessages.scrollHeight;}
    function hideTypingIndicator(){const el=document.getElementById('typing-indicator');if(el)el.remove();}
    init();
  </script>
</body>
</html>
