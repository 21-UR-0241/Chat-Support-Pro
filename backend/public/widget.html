    // =========================================================
    // API HELPERS
    // =========================================================
    async function fetchWithTimeout(url, options, timeout) {
      if (timeout === undefined) timeout = 15000;
      const controller = new AbortController();
      const id = setTimeout(function() { controller.abort(); }, timeout);
      try {
        const response = await fetch(url, Object.assign({}, options, { signal: controller.signal }));
        clearTimeout(id); return response;
      } catch(error) { clearTimeout(id); if (error.name === 'AbortError') throw new Error('Request timeout'); throw error; }
    }

    async function fetchWithRetry(url, options, timeout, retries) {
      if (timeout === undefined) timeout = 15000;
      if (retries === undefined) retries = 2;
      for (let attempt = 0; attempt <= retries; attempt++) {
        try { return await fetchWithTimeout(url, options, attempt === 0 ? timeout + 15000 : timeout); }
        catch(error) { if (attempt === retries) throw error; await new Promise(function(r) { setTimeout(r, 1000*(attempt+1)); }); }
      }
    }

    async function ensureFreshToken(forceRefresh) {
      const now = Date.now();
      if (!forceRefresh && wsToken && tokenLastRefreshed && (now - tokenLastRefreshed) < TOKEN_REFRESH_INTERVAL) return wsToken;
      try {
        const url = API_URL + '/api/widget/session?store=' + STORE_ID + (conversationId ? '&conversationId=' + conversationId : '');
        const response = await fetchWithRetry(url, {}, 10000, 1);
        if (response.ok) { const data = await response.json(); wsToken = data.token; tokenLastRefreshed = now; return wsToken; }
      } catch(error) { console.error('[Token] Error:', error); }
      return wsToken;
    }

    async function fetchCustomerData(email) {
      if (!email) return null;
      try {
        const response = await fetchWithTimeout(API_URL + '/api/customers/lookup?store=' + STORE_ID + '&email=' + encodeURIComponent(email), {}, 12000);
        if (response.ok) { customerData = await response.json(); return customerData; }
      } catch(error) { console.error('Failed to fetch customer:', error); }
      return null;
    }

    async function fetchCustomerOrders(email) {
      if (!email) return [];
      try {
        const response = await fetchWithTimeout(API_URL + '/api/customers/orders?store=' + STORE_ID + '&email=' + encodeURIComponent(email), {}, 12000);
        if (response.ok) { customerOrders = await response.json(); return customerOrders; }
      } catch(error) { console.error('Failed to fetch orders:', error); }
      return [];
    }

    async function lookupConversation(email) {
      if (!email || !STORE_ID) return null;
      try {
        const response = await fetchWithTimeout(API_URL + '/api/widget/conversation/lookup?store=' + STORE_ID + '&email=' + encodeURIComponent(email), {}, 10000);
        if (response.ok) { const data = await response.json(); if (data.conversationId) return data.conversationId; }
      } catch(error) { console.error('[Lookup] Error:', error); }
      return null;
    }

    async function fetchCustomerCart(email) {
      if (!email) return null;
      try { if (window.parent && window.parent.chatCartData) { customerCart = window.parent.chatCartData; return customerCart; } } catch(e) {}
      try {
        const response = await fetchWithTimeout(API_URL + '/api/customers/cart?store=' + STORE_ID + '&email=' + encodeURIComponent(email), {}, 12000);
        if (response.ok) { customerCart = await response.json(); return customerCart; }
      } catch(error) { console.error('Failed to fetch cart:', error); }
      return null;
    }

    // =========================================================
    // INIT
    // =========================================================
    async function init() {
      try {
        detectMessageSource();
        await loadSettings();
        setupEventListeners();
        const detected = autoDetectCustomer();
        if (detected) {
          customerEmail = detected.email;
          customerName  = detected.name || 'Guest';
          localStorage.setItem('chat_email_' + STORE_ID, customerEmail);
          if (customerName) localStorage.setItem('chat_name_' + STORE_ID, customerName);
          conversationId = localStorage.getItem('chat_conv_' + STORE_ID);
          if (!conversationId && customerEmail) {
            const lookedUp = await lookupConversation(customerEmail);
            if (lookedUp) { conversationId = String(lookedUp); localStorage.setItem('chat_conv_' + STORE_ID, conversationId); }
          }
          await loadCustomerData();
          await showChatInterface();
        } else {
          emailCollection.classList.add('visible');
          updateStatus('online', 'We usually get back to you within 1 to 6 hours <strong>(Please note it can be the next day as well in some cases)</strong>');
        }
      } catch(error) { console.error('[Init] Fatal:', error); updateStatus('offline', 'Offline'); }
    }

    function updateStatus(status, text) {
      statusText.innerHTML = text;
      statusIndicator.classList.remove('offline','connecting');
      if (status === 'connecting') statusIndicator.classList.add('connecting');
      else if (status === 'offline') statusIndicator.classList.add('offline');
    }

    async function loadSettings() {
      try {
        const response = await fetchWithRetry(API_URL + '/api/widget/settings?store=' + STORE_ID, {}, 15000, 2);
        if (response.ok) {
          storeSettings = await response.json();
          brandNameEl.textContent = storeSettings.brandName || 'Chat Support';
          document.documentElement.style.setProperty('--primary-color', '#3bbe28');
          document.documentElement.style.setProperty('--primary-dark', '#2fa01e');
          document.documentElement.style.setProperty('--primary-light', '#4cd938');
          document.documentElement.style.setProperty('--success-color', '#3bbe28');
          if (storeSettings.widgetSettings && storeSettings.widgetSettings.greeting)
            welcomeMessage.querySelector('p').innerHTML = storeSettings.widgetSettings.greeting;
          if (storeSettings.widgetSettings && storeSettings.widgetSettings.placeholder)
            chatInput.placeholder = storeSettings.widgetSettings.placeholder;
        }
        await ensureFreshToken(true);
      } catch(error) { console.error('[Settings] Error:', error); }
    }

    // =========================================================
    // WEBSOCKET
    // =========================================================
    async function connectWebSocket() {
      if (ws && (ws.readyState === WebSocket.CONNECTING || ws.readyState === WebSocket.OPEN)) return;
      if (!conversationId) return;
      try {
        updateStatus('connecting', 'Connecting...');
        await ensureFreshToken(reconnectAttempts > 0);
        if (!wsToken) { updateStatus('offline', 'No token'); return; }
        if (ws) { ws.close(); ws = null; }
        ws = new WebSocket(WS_URL);
        ws.onopen = function() {
          reconnectAttempts = 0;
          ws.send(JSON.stringify({ type:'auth', token:wsToken, clientType:'customer' }));
        };
        ws.onmessage = function(event) {
          try { handleWebSocketMessage(JSON.parse(event.data)); } catch(error) { console.error('[WebSocket] Parse error:', error); }
        };
        ws.onerror = function() { updateStatus('offline', 'Error'); };
        ws.onclose = function(event) {
          updateStatus('offline', 'Disconnected'); ws = null;
          if (reconnectAttempts < maxReconnectAttempts && conversationId) {
            reconnectAttempts++;
            updateStatus('connecting', 'Reconnecting...');
            setTimeout(function() { connectWebSocket(); }, reconnectDelay * reconnectAttempts);
          } else if (reconnectAttempts >= maxReconnectAttempts) {
            updateStatus('offline', 'Offline');
          }
        };
      } catch(error) { console.error('[WebSocket] Failed:', error); updateStatus('offline', 'Failed'); }
    }

    function handleWebSocketMessage(data) {
      switch (data.type) {
        case 'connected': break;
        case 'auth_ok':
          updateStatus('online', 'We usually get back to you within 1 to 6 hours <strong>(Please note it can be the next day as well in some cases)</strong>');
          ws.send(JSON.stringify({ type:'join_conversation', conversationId:parseInt(conversationId), role:'customer', token:wsToken, customerEmail, customerName, storeId:storeSettings?storeSettings.storeId:undefined }));
          sendPresenceUpdate('online');
          break;
        case 'joined':
          updateStatus('online', 'We usually get back to you within 1 to 6 hours <strong>(Please note it can be the next day as well in some cases)</strong>');
          break;
        case 'new_message':
          if (data.message) { onUserActivity(); displayMessageFromWebSocket(data.message); }
          break;
        case 'message_confirmed': updateMessageStatus(data.tempId, 'confirmed', data.message); break;
        case 'message_failed': updateMessageStatus(data.tempId, 'failed'); break;
        case 'typing':
          if (data.isTyping && data.senderType === 'agent') showTypingIndicator();
          else if (!data.isTyping) hideTypingIndicator();
          break;
        case 'message_deleted':
          if (data.messageId) {
            const msgEl = document.querySelector('[data-message-id="' + data.messageId + '"]');
            if (msgEl) msgEl.remove();
            displayedMessageIds.delete(data.messageId);
            updateMessageDateDisplay();
          }
          break;
        case 'error':
          console.error('[WebSocket] Error:', data.message);
          if (data.message && (data.message.includes('token') || data.message.includes('auth'))) { wsToken = null; tokenLastRefreshed = null; }
          break;
      }
    }

    function displayMessageFromWebSocket(message) {
      const msg = {
        id: message.id,
        senderType: message.senderType || message.sender_type,
        senderName: message.senderName || message.sender_name,
        content: message.content,
        conversationId: message.conversationId || message.conversation_id,
        pending: message.pending,
        fileData: message.fileData || message.file_data || null,
        timestamp: message.createdAt || message.created_at || new Date().toISOString()
      };
      if (msg.conversationId && msg.conversationId !== parseInt(conversationId)) return;
      if (displayedMessageIds.has(msg.id)) return;
      if (msg.senderType === 'customer') { displayedMessageIds.add(msg.id); return; }
      hideTypingIndicator();
      displayedMessageIds.add(msg.id);
      addMessage(msg.senderType, msg.content, msg.senderName || 'Support', msg.id, msg.pending, msg.fileData);
    }

    function updateMessageStatus(tempId, status, confirmedMessage) {
      document.querySelectorAll('.message').forEach(function(el) {
        if (el.dataset.messageId === tempId) {
          if (status === 'confirmed') { el.dataset.messageId = (confirmedMessage && confirmedMessage.id) || tempId; el.classList.remove('pending'); }
          else if (status === 'failed') { el.classList.remove('pending'); el.classList.add('failed'); }
        }
      });
    }

    // =========================================================
    // EVENT LISTENERS & SEND
    // =========================================================
    function setupEventListeners() {
      chatInput.addEventListener('input', function() {
        updateSendButton(); autoResizeTextarea();
        clearTimeout(typingDebounceTimer);
        typingDebounceTimer = setTimeout(function() {
          if (ws && ws.readyState === WebSocket.OPEN && conversationId && chatInput.value.trim()) {
            ws.send(JSON.stringify({ type:'typing', conversationId:parseInt(conversationId), isTyping:true, senderType:'customer', senderName:customerName||'Customer' }));
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(function() {
              if (ws && ws.readyState === WebSocket.OPEN && conversationId)
                ws.send(JSON.stringify({ type:'typing', conversationId:parseInt(conversationId), isTyping:false, senderType:'customer' }));
            }, 3000);
          }
        }, 300);
      });
      chatInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (chatInput.value.trim() || selectedFile) sendMessage(); }
      });
      sendButton.addEventListener('click', sendMessage);
    }

    function autoResizeTextarea() { chatInput.style.height = 'auto'; chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px'; }

    async function sendMessage() {
      const message = chatInput.value.trim();
      if (!message && !selectedFile) return;
      if (uploading) return;
      onUserActivity();
      clearTimeout(typingTimeout); clearTimeout(typingDebounceTimer);
      if (ws && ws.readyState === WebSocket.OPEN && conversationId)
        ws.send(JSON.stringify({ type:'typing', conversationId:parseInt(conversationId), isTyping:false, senderType:'customer' }));

      chatInput.disabled = true; sendButton.disabled = true; attachButton.disabled = true; removeFileBtn.disabled = true;
      const tempId = 'temp-' + Date.now() + '-' + Math.random().toString(36).substr(2,9);

      let fileData = null;
      if (selectedFile) {
        try {
          const uploadResult = await uploadFileToBunny(selectedFile);
          fileData = { url: uploadResult.url, name: selectedFile.name, type: selectedFile.type, size: selectedFile.size };
        } catch(error) {
          addMessage('system', 'Failed to upload file. Please try again.', 'System');
          chatInput.disabled = false; sendButton.disabled = false; attachButton.disabled = false; removeFileBtn.disabled = false;
          return;
        }
      }

      addMessage('customer', message, customerName || 'You', tempId, true, fileData);
      chatInput.value = ''; chatInput.style.height = 'auto'; removeFile();
      if (welcomeMessage.style.display !== 'none') welcomeMessage.style.display = 'none';

      try {
        if (!conversationId) {
          await ensureFreshToken(true);
          const response = await fetchWithRetry(API_URL + '/api/conversations', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              storeIdentifier: STORE_ID, customerEmail, customerName,
              initialMessage: message || (fileData ? '📎 ' + fileData.name : ''),
              customerData, hasOrders: customerOrders.length > 0,
              orderCount: customerOrders.length,
              cartSubtotal: customerCart ? customerCart.subtotal || 0 : 0,
              source: messageSource || 'website', fileData
            })
          }, 15000, 2);
          if (!response.ok) throw new Error('Failed to create conversation');
          const conv = await response.json();
          conversationId = conv.id;
          localStorage.setItem('chat_conv_' + STORE_ID, conversationId);
          updateMessageStatus(tempId, 'confirmed', { id: tempId });
          sendPresenceUpdate('online');
          if (wsToken && !ws) connectWebSocket().catch(function() {});
          let autoReply = 'Thanks for reaching out! An agent will be with you shortly.';
          if (customerData && customerData.name) autoReply = 'Hi ' + customerData.name + '! ' + autoReply;
          if (customerOrders.length > 0) autoReply += ' We can see you have ' + customerOrders.length + ' order' + (customerOrders.length !== 1 ? 's' : '') + ' with us.';
          addMessage('agent', autoReply, 'Support Team');
        } else {
          await ensureFreshToken(false);
          const response = await fetchWithRetry(API_URL + '/api/widget/messages', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              conversationId: parseInt(conversationId), customerEmail, customerName,
              content: message || '', storeIdentifier: STORE_ID, tempId,
              customerData, hasOrders: customerOrders.length > 0,
              cartSubtotal: customerCart ? customerCart.subtotal || 0 : 0,
              source: messageSource || 'website', fileData
            })
          }, 15000, 2);

          if (!response.ok) {
            const errorData = await response.json().catch(function() { return {}; });
            updateMessageStatus(tempId, 'failed');
            if (errorData.error && (
              errorData.error.includes('conversation') ||
              errorData.error === 'conversation_not_found' ||
              errorData.error.includes('token') ||
              errorData.error.includes('unauthorized')
            )) {
              localStorage.removeItem('chat_conv_' + STORE_ID);
              conversationId = null; wsToken = null; tokenLastRefreshed = null; historyLoaded = false;
              if (ws && ws.readyState === WebSocket.OPEN) { ws.close(); ws = null; }
              const failedMsg = document.querySelector('[data-message-id="' + tempId + '"]');
              if (failedMsg) failedMsg.remove();
              addMessage('system', 'Session expired. Creating new conversation...', 'System');
              await new Promise(function(resolve) { setTimeout(resolve, 800); });
              const systemMsg = chatMessages.lastElementChild;
              if (systemMsg && systemMsg.classList.contains('system')) systemMsg.remove();
              chatInput.value = message; chatInput.disabled = false; sendButton.disabled = false; attachButton.disabled = false;
              return sendMessage();
            } else {
              throw new Error(errorData.error || 'Failed to send');
            }
          } else {
            const sentMessage = await response.json();
            updateMessageStatus(tempId, 'confirmed', sentMessage);
            if (sentMessage.id) displayedMessageIds.add(sentMessage.id);
          }
        }

        chatInput.disabled = false; sendButton.disabled = false; attachButton.disabled = false; removeFileBtn.disabled = false;
        chatInput.focus();

      } catch(error) {
        console.error('Send failed:', error);
        if (error.message.includes('token') || error.message.includes('unauthorized')) { wsToken = null; tokenLastRefreshed = null; }
        updateMessageStatus(tempId, 'failed');
        const errorMsg = error.message === 'Request timeout'
          ? 'Connection is slow. Please try sending again.'
          : 'Failed to send. Please try again.';
        addMessage('system', errorMsg, 'System');
        chatInput.disabled = false; sendButton.disabled = false; attachButton.disabled = false; removeFileBtn.disabled = false;
        chatInput.focus();
      }
    }
